<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pabimi — Orçamentos</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #faf7f2; }
  #lock {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #3d2b1f;
  }
  .lock-box {
    background: #fff; border-radius: 20px; padding: 40px;
    width: min(380px, 90vw); text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .lock-box h2 { color: #2c1810; font-size: 22px; margin-bottom: 8px; }
  .lock-box p { color: #9a7a65; font-size: 14px; margin-bottom: 24px; }
  .lock-box input {
    width: 100%; padding: 13px 16px; border: 2px solid #e8dcd0;
    border-radius: 12px; font-size: 16px; margin-bottom: 12px;
    outline: none; transition: border-color .2s;
  }
  .lock-box input:focus { border-color: #8b5e3c; }
  .lock-box button {
    width: 100%; padding: 13px; background: #3d2b1f; color: #fff;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
  .lock-box button:hover { background: #8b5e3c; }
  .error { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }
  .logo { font-size: 36px; margin-bottom: 16px; }
  #loading { display:none; padding:40px; text-align:center; color:#8b5e3c; font-size:16px; }
  #app-error { display:none; padding:30px; color:red; background:#fff3f3; margin:20px; border-radius:8px; }
</style>
</head>
<body>

<div id="lock">
  <div class="lock-box">
    <div class="logo">🪵</div>
    <h2>Pabimi — Orçamentos</h2>
    <p>Digite a senha para acessar</p>
    <input type="password" id="pwd" placeholder="Senha" onkeydown="if(event.key==='Enter')check()">
    <div class="error" id="err">Senha incorreta. Tente novamente.</div>
    <button onclick="check()" style="margin-top:12px">Entrar</button>
    <p style="margin-top:20px;font-size:13px"><a href="/" style="color:#8b5e3c">← Voltar ao site</a></p>
  </div>
</div>

<div id="loading">⏳ Carregando sistema de orçamentos...</div>
<div id="app-error"></div>
<div id="app" style="display:none"></div>

<script>
const SENHA = '197500';
let unlocked = false;

function check() {
  const val = document.getElementById('pwd').value;
  if (val === SENHA) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    if (!unlocked) { unlocked = true; loadApp(); }
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

function loadApp() {
  fetch('pabimi_v5.jsx')
    .then(r => {
      if (!r.ok) throw new Error('Arquivo não encontrado (HTTP ' + r.status + ')');
      return r.text();
    })
    .then(jsx => {
      // Ensure React global is available (Babel helper)
      if (!window.__REACT_LOADED__) {
        window.__REACT_LOADED__ = true;
      }

      let code = jsx;

      // 1. Remove/comment out existing imports (they're already at the top)
      code = code.replace(
        /const\s*\{\s*useState\s*,\s*useMemo\s*,\s*useRef\s*,\s*useEffect\s*,\s*useCallback\s*\}\s*=\s*React\s*;/g,
        '// React hooks already available via React global'
      );

      // 2. Remove ES module imports if they somehow got in
      code = code.replace(/import\s*\{([^}]+)\}\s*from\s*['"]react['"]\s*;?/g,
        (_, imports) => `const { ${imports.trim()} } = React;`);

      // 3. Remove export default
      code = code.replace(/export\s+default\s+function\s+/g, 'function ');
      code = code.replace(/export\s+(function|const|class|let|var)\s+/g, '$1 ');

      // 4. Add React hooks re-declaration and render at the end
      code = `
// Ensure hooks are available
const { useState, useMemo, useRef, useEffect, useCallback } = React;

${code}

// Render App
;(function(){
  const rootEl = document.getElementById('app');
  if (!rootEl) throw new Error('No #app element found');
  const root = ReactDOM.createRoot(rootEl);
  root.render(React.createElement(App));
})();
`;

      console.log('Code prepared for Babel transformation...');

      // 5. Transform with Babel
      try {
        const transformed = Babel.transform(code, {
          presets: ['react'],
          filename: 'pabimi.jsx'
        }).code;

        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        console.log('Executing transformed code...');
        // eslint-disable-next-line no-eval
        eval(transformed);
        console.log('✅ App loaded successfully');

      } catch(babelErr) {
        throw new Error('Babel transformation failed: ' + babelErr.message);
      }
    })
    .catch(err => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app-error').style.display = 'block';
      document.getElementById('app-error').innerHTML =
        '<strong>Erro ao carregar o sistema:</strong><br>' + err.message +
        '<br><br><a href="/">← Voltar ao site</a>';
      console.error('❌ Fatal error:', err);
    });
}
</script>
</body>
</html>
